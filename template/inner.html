<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>CTR 전결검색</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:#F4F6FA;color:#1A1F26;padding:24px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:16px;flex-wrap:wrap}
.hd .ttl{font-size:22px;font-weight:700;color:#0B2C5C}
.hd .meta{font-size:12px;color:#6B7480;text-align:right;line-height:1.5}
.tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:2px solid #E2E6EE}
.tab{padding:10px 18px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;font-size:14px;font-weight:600;font-family:inherit;color:#6B7480;cursor:pointer}
.tab:hover{color:#13427F}
.tab.on{color:#0B2C5C;border-bottom-color:#0B2C5C}
.tab .cnt{display:inline-block;margin-left:6px;padding:2px 8px;background:#E2E6EE;color:#1A1F26;border-radius:10px;font-size:11px;font-weight:600}
.tab.on .cnt{background:#0B2C5C;color:#fff}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.bar input[type=text]{flex:1;min-width:240px;padding:10px 14px;border:1.5px solid #DCE1E8;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.bar input[type=text]:focus{border-color:#13427F;box-shadow:0 0 0 3px rgba(19,66,127,.1)}
.bar select{padding:10px 12px;border:1.5px solid #DCE1E8;border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
.cnt-bar{font-size:13px;color:#6B7480;margin-bottom:8px}
.tblw{background:#fff;border:1px solid #E2E6EE;border-radius:10px;overflow:auto;max-height:calc(100vh - 240px)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:0;background:#0B2C5C;color:#fff;font-weight:600;padding:10px 12px;text-align:left;white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid #EEF1F6;vertical-align:top}
tbody tr:hover{background:#F8FAFD}
tbody tr.hit mark{background:#FFF3B0;padding:0 2px;border-radius:2px}
.empty{padding:40px;text-align:center;color:#6B7480}
.btn{padding:9px 14px;border:1px solid #DCE1E8;border-radius:8px;background:#fff;font-size:13px;font-family:inherit;cursor:pointer}
.btn:hover{border-color:#13427F;color:#13427F}
</style>
</head>
<body>
<div class="hd">
  <div class="ttl">CTR 전결검색</div>
  <div class="meta" id="meta"></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="bar">
  <input id="q" type="text" placeholder="키워드 검색 (여러 단어는 공백으로 구분)">
  <select id="col"><option value="-1">전체 컬럼</option></select>
  <button class="btn" id="clr" type="button">초기화</button>
</div>
<div class="cnt-bar" id="cntbar"></div>
<div class="tblw">
  <table><thead><tr id="thr"></tr></thead><tbody id="tb"></tbody></table>
</div>
<script>
var DATA=__DATA__;
var active=0;
var qEl=document.getElementById("q"),colEl=document.getElementById("col"),tbEl=document.getElementById("tb");
var thr=document.getElementById("thr"),cntbar=document.getElementById("cntbar"),meta=document.getElementById("meta"),tabs=document.getElementById("tabs");
meta.innerHTML=DATA.map(function(d){return '데이터 출처: '+d.filename}).join('<br>');
DATA.forEach(function(d,i){
  var b=document.createElement("button");b.type="button";b.className="tab"+(i===0?" on":"");
  b.innerHTML=d.label+'<span class="cnt">'+d.rows.length+'</span>';
  b.addEventListener("click",function(){switchTab(i)});
  tabs.appendChild(b);
});
function switchTab(i){
  active=i;
  Array.prototype.forEach.call(tabs.children,function(c,k){c.classList.toggle("on",k===i)});
  var d=DATA[i];
  colEl.innerHTML='<option value="-1">전체 컬럼</option>';
  d.header.forEach(function(h,j){var op=document.createElement("option");op.value=j;op.textContent=h;colEl.appendChild(op)});
  thr.innerHTML="";
  d.header.forEach(function(h){var th=document.createElement("th");th.textContent=h;thr.appendChild(th)});
  qEl.value="";render();
}
function esc(s){return s.replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function mark(s,terms){
  if(!terms.length) return esc(s);
  var out=esc(s);
  terms.forEach(function(t){if(!t)return;var re=new RegExp("("+t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");out=out.replace(re,"<mark>$1</mark>")});
  return out;
}
function render(){
  var d=DATA[active],q=qEl.value.trim();
  var terms=q.split(/\s+/).filter(Boolean).map(function(t){return t.toLowerCase()});
  var ci=parseInt(colEl.value,10),frag=document.createDocumentFragment(),n=0;
  for(var i=0;i<d.rows.length;i++){
    var row=d.rows[i];
    var hay=ci<0?row.join("\n").toLowerCase():(row[ci]||"").toLowerCase();
    var ok=terms.every(function(t){return hay.indexOf(t)>=0});
    if(!ok) continue;
    n++;
    var tr=document.createElement("tr");
    if(terms.length) tr.className="hit";
    for(var j=0;j<d.header.length;j++){
      var td=document.createElement("td");td.innerHTML=mark(row[j]||"",terms);tr.appendChild(td);
    }
    frag.appendChild(tr);
    if(n>=2000) break;
  }
  tbEl.innerHTML="";tbEl.appendChild(frag);
  cntbar.textContent=d.rows.length+" 건 중 "+n+" 건"+(n>=2000?" (상위 2000건만 표시)":"");
  if(n===0) tbEl.innerHTML='<tr><td colspan="'+d.header.length+'" class="empty">검색 결과가 없습니다.</td></tr>';
}
qEl.addEventListener("input",render);
colEl.addEventListener("change",render);
document.getElementById("clr").addEventListener("click",function(){qEl.value="";colEl.value="-1";render();qEl.focus()});
switchTab(0);qEl.focus();
</script>
</body>
</html>
